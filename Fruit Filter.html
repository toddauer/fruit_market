<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruit Filter</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f0e8;
      --surface:   #fffdf8;
      --border:    #ddd8ce;
      --text:      #1a1714;
      --muted:     #8a8278;
      --accent:    #c84b2f;
      --accent-bg: #fdf0ed;
      --tag-bg:    #edeae3;
      --tag-text:  #5a5650;
      --highlight-bg: #ffe8b0;
      --highlight-text: #7a4f00;
      --radius:    12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 3rem 2rem;
    }

    header {
      max-width: 760px;
      margin: 0 auto 2.5rem;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }

    header p {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }

    .search-wrapper {
      max-width: 760px;
      margin: 0 auto 1.25rem;
      position: relative;
    }

    .search-wrapper svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 14px 16px 14px 46px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); }

    .meta {
      max-width: 760px;
      margin: 0 auto 1.25rem;
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
    }

    #fruit-list {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .fruit-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: fadeIn 0.18s ease;
      transition: border-color 0.15s, transform 0.15s;
    }

    .fruit-card:hover {
      border-color: #bbb6ae;
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .emoji {
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .fruit-info { min-width: 0; }

    .fruit-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 7px;
      color: var(--text);
    }

    .fruit-name mark {
      background: var(--highlight-bg);
      color: var(--highlight-text);
      border-radius: 3px;
      padding: 0 2px;
      font-style: normal;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-weight: 400;
      transition: background 0.15s, color 0.15s;
    }

    .tag.matched {
      background: var(--accent-bg);
      color: var(--accent);
      font-weight: 500;
    }

    #empty {
      display: none;
      max-width: 760px;
      margin: 2rem auto;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 3rem;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }
  </style>
</head>
<body>

  <header>
    <h1>Fruit Market</h1>
    <p>Type to filter by name, color, flavor, or texture.</p>
  </header>

  <div class="search-wrapper">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search" placeholder="Try 'red', 'tropical', 'berry', or 'a'…" autocomplete="off" />
  </div>

  <div class="meta" id="meta"></div>
  <div id="fruit-list"></div>
  <div id="empty">No fruits match your search.</div>

  <script>
    const fruits = [
      { name: 'Apple',      tags: ['red', 'green', 'sweet', 'crunchy'],         emoji: '🍎' },
      { name: 'Avocado',    tags: ['green', 'savory', 'creamy', 'rich'],         emoji: '🥑' },
      { name: 'Banana',     tags: ['yellow', 'sweet', 'tropical', 'soft'],       emoji: '🍌' },
      { name: 'Blueberry',  tags: ['blue', 'sweet', 'berry', 'tiny'],            emoji: '🫐' },
      { name: 'Cherry',     tags: ['red', 'sweet', 'berry', 'small'],            emoji: '🍒' },
      { name: 'Grape',      tags: ['purple', 'sweet', 'vine', 'juicy'],          emoji: '🍇' },
      { name: 'Kiwi',       tags: ['green', 'tangy', 'tropical', 'fuzzy'],       emoji: '🥝' },
      { name: 'Lemon',      tags: ['yellow', 'sour', 'citrus', 'bright'],        emoji: '🍋' },
      { name: 'Mango',      tags: ['orange', 'sweet', 'tropical', 'juicy'],      emoji: '🥭' },
      { name: 'Orange',     tags: ['orange', 'citrus', 'tangy', 'juicy'],        emoji: '🍊' },
      { name: 'Peach',      tags: ['orange', 'sweet', 'fuzzy', 'soft'],          emoji: '🍑' },
      { name: 'Pear',       tags: ['green', 'sweet', 'mild', 'soft'],            emoji: '🍐' },
      { name: 'Pineapple',  tags: ['yellow', 'tropical', 'tangy', 'spiky'],      emoji: '🍍' },
      { name: 'Raspberry',  tags: ['red', 'berry', 'tangy', 'seedy'],            emoji: '🍓' },
      { name: 'Strawberry', tags: ['red', 'berry', 'sweet', 'juicy'],            emoji: '🍓' },
      { name: 'Watermelon', tags: ['red', 'green', 'sweet', 'summer', 'juicy'],  emoji: '🍉' },
    ];

    const listEl   = document.getElementById('fruit-list');
    const metaEl   = document.getElementById('meta');
    const emptyEl  = document.getElementById('empty');
    const searchEl = document.getElementById('search');

    // Wrap the matching portion of a string in a <mark> tag
    function highlight(text, query) {
      if (!query) return text;
      const idx = text.toLowerCase().indexOf(query.toLowerCase());
      if (idx === -1) return text;
      return (
        text.slice(0, idx) +
        '<mark>' + text.slice(idx, idx + query.length) + '</mark>' +
        text.slice(idx + query.length)
      );
    }

    // Build and insert cards for each fruit in the matches array
    function renderList(matches, query) {
      listEl.innerHTML = '';

      if (matches.length === 0) {
        emptyEl.style.display = 'block';
        metaEl.textContent = '';
        return;
      }

      emptyEl.style.display = 'none';
      metaEl.textContent = matches.length + ' of ' + fruits.length + ' fruits';

      matches.forEach(fruit => {
        const card = document.createElement('div');
        card.className = 'fruit-card';

        const tagsHTML = fruit.tags.map(tag => {
          const isMatch = query && tag.toLowerCase().includes(query.toLowerCase());
          return `<span class="tag${isMatch ? ' matched' : ''}">${tag}</span>`;
        }).join('');

        card.innerHTML = `
          <span class="emoji">${fruit.emoji}</span>
          <div class="fruit-info">
            <div class="fruit-name">${highlight(fruit.name, query)}</div>
            <div class="tags">${tagsHTML}</div>
          </div>
        `;

        listEl.appendChild(card);
      });
    }

    // Return only fruits whose name or tags contain the query string
    function filterFruits(query) {
      const q = query.trim().toLowerCase();
      if (!q) return fruits;
      return fruits.filter(fruit => {
        const nameMatch = fruit.name.toLowerCase().includes(q);
        const tagMatch  = fruit.tags.some(tag => tag.includes(q));
        return nameMatch || tagMatch;
      });
    }

    // Re-filter and re-render every time the user types
    searchEl.addEventListener('input', () => {
      const query   = searchEl.value;
      const matches = filterFruits(query);
      renderList(matches, query.trim());
    });

    // Initial render — show everything
    renderList(fruits, '');
  </script>

</body>
</html>
